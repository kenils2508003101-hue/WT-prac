    function displayPlayerData() {
        const player = playerData[name];
        if (!player) {
            document.getElementById("playerName").innerText = "Player not found";
            return;
        }

        // Main Info
        document.getElementById("playerName").innerText = name;
        document.getElementById("playerInfo").innerText = player.info;
        document.getElementById("playerBio").innerHTML = player.bio;
        document.getElementById("playerImage").src = player.image;

        // Stats
        let statsHTML = "";
        player.stats.forEach(stat => {
            statsHTML += `<div class="col-md-3"><div class="card text-center p-3 bg-light border-0"><h5 class="text-primary">${stat.value}</h5><p class="text-muted mb-0">${stat.label}</p></div></div>`;
        });
        document.getElementById("statsContent").innerHTML = statsHTML;

        // Highlights
        let highlightsHTML = "";
        player.highlights.forEach(highlight => {
            highlightsHTML += `<div class="col-md-6"><div class="card border-left border-warning p-3"><i class="fas fa-check-circle text-success me-2"></i>${highlight}</div></div>`;
        });
        document.getElementById("highlightsContent").innerHTML = highlightsHTML;

        // Achievements
        let achievementsHTML = "";
        player.achievements.forEach(achievement => {
            achievementsHTML += `<div class="col-md-6"><div class="card border-left border-success p-3"><i class="fas fa-medal text-warning me-2"></i>${achievement}</div></div>`;
        });
        document.getElementById("achievementsContent").innerHTML = achievementsHTML;
    }
